      operationId: 34bfb7bc9d984ecf5c1d1d23e5d8e83a
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                description:
                  type: string
                permissions:
                  type: object
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/Role' }
                type: object
        '404':
          description: 角色不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 角色名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - 角色管理
      summary: 删除角色
      description: 删除角色。内置角色（admin/member/guest）和有用户关联的角色不允许删除。
      operationId: f33b55a58fd9e5a744ef869073ef5d70
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 内置角色不可删除或有用户关联
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 角色不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /telemetry:
    get:
      tags:
        - 遥测数据
      summary: 原始遥测数据
      description: '查询指定设备的原始遥测记录，支持按指标和时间范围筛选。必须指定 device_id。'
      operationId: 66ef156ef65a60679da521e356d61570
      parameters:
        -
          name: device_id
          in: query
          required: true
          schema:
            type: integer
        -
          name: metric_key
          in: query
          description: '指标名（如 temperature）'
          required: false
          schema:
            type: string
        -
          name: start
          in: query
          description: '起始时间（ISO 8601）'
          required: false
          schema:
            type: string
            format: date-time
        -
          name: end
          in: query
          description: '结束时间（ISO 8601）'
          required: false
          schema:
            type: string
            format: date-time
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 500
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
        '422':
          description: '缺少 device_id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /telemetry/latest:
    get:
      tags:
        - 遥测数据
      summary: 设备最新遥测值
      description: '获取指定设备各指标的最新值。优先从 Redis 缓存读取，未命中则查询数据库。'
      operationId: ae2d9d06cec131e16ca32fe707b5891d
      parameters:
        -
          name: device_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { type: array, items: { properties: { metric_key: { type: string, example: temperature }, value: { example: 25.6 }, ts: { type: string, format: date-time } }, type: object } }
                type: object
        '422':
          description: '缺少 device_id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /telemetry/aggregated:
    get:
      tags:
        - 遥测数据
      summary: 小时聚合数据
      description: '查询指定设备和指标的小时级聚合数据，用于图表展示。查询 telemetry_hourly 视图，性能优。'
      operationId: bd0cb65995ecad959b8d8786f808d008
      parameters:
        -
          name: device_id
          in: query
          required: true
          schema:
            type: integer
        -
          name: metric_key
          in: query
          required: true
          schema:
            type: string
        -
          name: start
          in: query
          description: '起始时间（默认 7 天前）'
          required: false
          schema:
            type: string
            format: date-time
        -
          name: end
          in: query
          description: 结束时间（默认当前）
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { type: array, items: { properties: { bucket: { type: string, format: date-time }, avg_value: { type: number, example: 25.3 }, min_value: { type: number, example: 24.1 }, max_value: { type: number, example: 26.8 }, sample_count: { type: integer, example: 60 } }, type: object } }
                type: object
        '422':
          description: 参数缺失
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /users:
    get:
      tags:
        - 用户管理
      summary: 用户列表
      description: 获取用户列表，支持关键词搜索和激活状态筛选。
      operationId: 1cec78dd32b8ef70d85d460b4e529573
      parameters:
        -
          name: keyword
          in: query
          description: 搜索用户名、姓名、邮箱
          required: false
          schema:
            type: string
        -
          name: is_active
          in: query
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
      security:
        -
          bearerAuth: []
    post:
      tags:
        - 用户管理
      summary: 创建用户
      operationId: e39a2f4caf4adeb97f10969d0900ffca
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: kid
                password:
                  description: '至少 6 位'
                  type: string
                  example: '123456'
                email:
                  type: string
                  example: kid@example.com
                full_name:
                  type: string
                  example: 小孩
                role_ids:
                  type: array
                  items: { type: integer }
                  example: [2]
                allowed_locations:
                  description: 空数组=不限制
                  type: array
                  items: { type: string }
                  example: [儿童房]
              type: object
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/User' }
                type: object
        '422':
          description: 参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 用户名或邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  '/users/{id}':
    get:
      tags:
        - 用户管理
      summary: 用户详情
      description: 获取用户详细信息，包含角色和位置作用域。
      operationId: 4835d24d9ba1541096c2090347b908f1
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/User' }
                type: object
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    put:
      tags:
        - 用户管理
      summary: 更新用户
      operationId: af56e470aca1e790add62a65484a6fa5
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                full_name:
                  type: string
                password:
                  description: 不传则不修改
                  type: string
                is_active:
                  type: boolean
                role_ids:
                  type: array
                  items: { type: integer }
                allowed_locations:
                  type: array
                  items: { type: string }
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/User' }
                type: object
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - 用户管理
      summary: 删除用户
      description: 删除指定用户。不允许删除自己的账号。
      operationId: a3f3e2b2888f931cffc264c257970e82
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 不能删除自己
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
components:
  schemas:
    SuccessResponse:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data: {  }
      type: object
    ErrorResponse:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
          example: 参数验证失败
        data: {  }
      type: object
    PaginationMeta:
      properties:
        items:
          type: array
          items: {  }
        total:
          type: integer
          example: 100
        per_page:
          type: integer
          example: 20
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
      type: object
    Device:
      properties:
        id:
          type: integer
          example: 1
        device_uid:
          type: string
          example: esp32-living-room-01
        name:
          type: string
          example: 客厅温湿度传感器
        type:
          type: string
          example: sensor
        location:
          type: string
          example: 客厅
        is_online:
          type: boolean
          example: true
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      type: object
    AlertRule:
      properties:
        id:
          type: integer
        name:
          type: string
          example: 温度过高
        device_id:
          type: integer
        telemetry_key:
          type: string
          example: temperature
        condition:
          type: string
          example: GREATER_THAN
        threshold_value:
          type: array
          items:
            type: number
          example:
            - 35
        trigger_duration_sec:
          type: integer
          example: 60
        is_enabled:
          type: boolean
        notification_channel_ids:
          type: array
          items:
            type: integer
      type: object
    AlertLog:
      properties:
        id:
          type: integer
        rule_id:
          type: integer
        device_id:
          type: integer
        status:
          type: string
          enum:
            - triggered
            - acknowledged
            - resolved
        triggered_value:
          type: number
        message:
          type: string
          nullable: true
        triggered_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
      type: object
    Automation:
      properties:
        id:
          type: integer
        name:
          type: string
          example: 温度过高开空调
        trigger_type:
          type: string
          enum:
            - telemetry
            - schedule
        trigger_config:
          type: object
        actions:
          type: array
          items:
            type: object
        is_enabled:
          type: boolean
      type: object
    NotificationChannel:
      properties:
        id:
          type: integer
        name:
          type: string
          example: 管理员邮箱
        type:
          type: string
          enum:
            - email
            - webhook
            - telegram
            - wechat_work
            - dingtalk
        config:
          type: object
        is_enabled:
          type: boolean
      type: object
    User:
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        full_name:
          type: string
          nullable: true
        is_active:
          type: boolean
        roles:
          type: array
          items:
            properties:
              id:
                type: integer
              name:
                type: string
            type: object
      type: object
    Role:
      properties:
        id:
          type: integer
        name:
          type: string
          example: admin
        description:
          type: string
          nullable: true
        permissions:
          type: object
      type: object
    Dashboard:
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        configuration:
          type: object
        owner_id:
          type: integer
      type: object
    CommandLog:
      properties:
        id:
          type: integer
        device_id:
          type: integer
        request_id:
          type: string
        action:
          type: string
        params:
          type: object
        status:
          type: string
          enum:
            - pending
            - delivered
            - success
            - failed
            - timeout
        response:
          type: object
          nullable: true
        sent_at:
          type: string
          format: date-time
        responded_at:
          type: string
          format: date-time
          nullable: true
      type: object
    AuditLog:
      properties:
        id:
          type: integer
        user_id:
          type: integer
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: integer
          nullable: true
        changes:
          type: object
          nullable: true
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time
      type: object
  securitySchemes:
    bearerAuth:
      type: http
      description: '在登录接口获取 access_token，填入此处'
      bearerFormat: JWT
      scheme: bearer
tags:
  -
    name: 告警日志
    description: 告警记录查询、确认、解决
  -
    name: 告警规则
    description: '告警规则的 CRUD'
  -
    name: 审计日志
    description: 操作审计日志查询（只读）
  -
    name: 认证
    description: '登录、注销、Token 刷新、个人信息'
  -
    name: 自动化
    description: '自动化规则的 CRUD'
  -
    name: 指令日志
    description: 设备控制指令执行历史（只读）
  -
    name: 仪表盘
    description: '用户自定义仪表盘 CRUD'
  -
    name: 设备属性
    description: '设备扩展属性管理（EAV 模式）'
  -
    name: 设备管理
    description: '设备的 CRUD 和控制指令'
  -
    name: 'MQTT 认证'
    description: 'EMQX 内部回调接口（设备认证 & ACL）'
  -
    name: 通知渠道
    description: '通知渠道的 CRUD 和测试'
  -
    name: 角色管理
    description: '角色的 CRUD'
  -
    name: 遥测数据
    description: 设备遥测数据查询（只读）
  -
    name: 用户管理
    description: '用户的 CRUD、角色分配、位置作用域'
