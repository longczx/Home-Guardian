openapi: 3.0.0
info:
  title: 'Home Guardian API'
  description: "Home Guardian 智能家居平台 RESTful API。\n\n## 认证方式\n除公开接口（登录、Token 刷新、健康检查）外，所有接口需在请求头中携带 JWT：\n```\nAuthorization: Bearer {access_token}\n```\n\n## 响应格式\n所有接口返回统一 JSON 结构：\n```json\n{\n  \"code\": 0,\n  \"message\": \"ok\",\n  \"data\": { ... }\n}\n```\n- `code = 0` 表示成功，非 0 为业务错误码\n- 分页接口的 `data` 包含 `items`、`total`、`per_page`、`current_page`、`last_page`\n\n## 权限模型\nRBAC 角色权限 + 位置作用域。权限格式：`resource.action`（如 `devices.view`、`alerts.create`）。\n用户可被限制只能访问特定位置的设备和数据。"
  version: 1.0.0
servers:
  -
    url: /api
    description: 当前服务器
paths:
  /alert-logs:
    get:
      tags:
        - 告警日志
      summary: 告警日志列表
      description: 查询告警记录，支持按设备、规则、状态筛选。自动按用户位置作用域过滤。
      operationId: 8403a15ec19e77cd6bf6cd18c5a5312a
      parameters:
        -
          name: device_id
          in: query
          required: false
          schema:
            type: integer
        -
          name: rule_id
          in: query
          required: false
          schema:
            type: integer
        -
          name: status
          in: query
          description: 'triggered / acknowledged / resolved'
          required: false
          schema:
            type: string
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
      security:
        -
          bearerAuth: []
  '/alert-logs/{id}':
    get:
      tags:
        - 告警日志
      summary: 告警详情
      description: 获取指定告警的详细信息，包含关联规则、设备和确认人信息。
      operationId: 63fe8a3e45516989e31ee868c78ced3f
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/AlertLog' }
                type: object
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  '/alert-logs/{id}/acknowledge':
    patch:
      tags:
        - 告警日志
      summary: 确认告警
      description: 标记告警为已确认状态，记录确认人和时间。
      operationId: 3f91968df5b04ffca656428d3e54ef47
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: 告警已确认 }
                  data: { $ref: '#/components/schemas/AlertLog' }
                type: object
      security:
        -
          bearerAuth: []
  '/alert-logs/{id}/resolve':
    patch:
      tags:
        - 告警日志
      summary: 解决告警
      description: 标记告警为已解决状态。
      operationId: ea136132c0a1084042e16619df3b53ad
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 解决成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: 告警已解决 }
                  data: { $ref: '#/components/schemas/AlertLog' }
                type: object
      security:
        -
          bearerAuth: []
  /alert-rules:
    get:
      tags:
        - 告警规则
      summary: 告警规则列表
      description: 获取告警规则列表，支持按设备和启用状态筛选。自动按用户位置作用域过滤。
      operationId: 8221259959438247f40ebc4cb6caea09
      parameters:
        -
          name: device_id
          in: query
          required: false
          schema:
            type: integer
        -
          name: is_enabled
          in: query
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
      security:
        -
          bearerAuth: []
    post:
      tags:
        - 告警规则
      summary: 创建告警规则
      description: 创建新的告警规则。当设备遥测值满足条件并持续指定时间后触发告警。
      operationId: 27365c870d58eb1e4442e2ab5585b5f1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - device_id
                - telemetry_key
                - condition
                - threshold_value
              properties:
                name:
                  type: string
                  example: 温度过高
                device_id:
                  type: integer
                  example: 1
                telemetry_key:
                  type: string
                  example: temperature
                condition:
                  description: 'GREATER_THAN / LESS_THAN / EQUAL / NOT_EQUAL / BETWEEN / NOT_BETWEEN'
                  type: string
                  example: GREATER_THAN
                threshold_value:
                  description: '阈值，单值或数组（BETWEEN 用 [min, max]）'
                  example: [35]
                trigger_duration_sec:
                  description: 持续触发秒数（0=立即）
                  type: integer
                  example: 60
                notification_channel_ids:
                  description: '通知渠道 ID 列表'
                  type: array
                  items: { type: integer }
              type: object
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/AlertRule' }
                type: object
        '422':
          description: 参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  '/alert-rules/{id}':
    get:
      tags:
        - 告警规则
      summary: 告警规则详情
      operationId: 77476b2d0fe4a5a5326f158d871122b7
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/AlertRule' }
                type: object
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    put:
      tags:
        - 告警规则
      summary: 更新告警规则
      operationId: d1bfe5c5cb0a3d218c6e62bff7a506b8
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                telemetry_key:
                  type: string
                condition:
                  type: string
                threshold_value: {  }
                trigger_duration_sec:
                  type: integer
                is_enabled:
                  type: boolean
                notification_channel_ids:
                  type: array
                  items: { type: integer }
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/AlertRule' }
                type: object
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - 告警规则
      summary: 删除告警规则
      operationId: 7a81828e59e8613738b07fe3001cd4c4
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /audit-logs:
    get:
      tags:
        - 审计日志
      summary: 审计日志列表
      description: '查询操作审计日志。非 admin 用户只能查看自己的操作记录。'
      operationId: 0c18f5b255befbc21c8cdac3b3105388
      parameters:
        -
          name: user_id
          in: query
          description: '按用户筛选（仅 admin）'
          required: false
          schema:
            type: integer
        -
          name: action
          in: query
          description: '操作类型（login/create/update/delete 等）'
          required: false
          schema:
            type: string
        -
          name: resource_type
          in: query
          description: '资源类型（device/user/alert_rule 等）'
          required: false
          schema:
            type: string
        -
          name: resource_id
          in: query
          description: '资源 ID（需配合 resource_type 使用）'
          required: false
          schema:
            type: integer
        -
          name: start
          in: query
          description: 起始时间
          required: false
          schema:
            type: string
            format: date-time
        -
          name: end
          in: query
          description: 结束时间
          required: false
          schema:
            type: string
            format: date-time
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
      security:
        -
          bearerAuth: []
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: '使用用户名和密码登录，获取 JWT access_token 和 refresh_token。'
      operationId: 6e56633823ccc4e9a0deffe6685ca317
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: dad
                password:
                  type: string
                  example: '123456'
              type: object
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: 登录成功 }
                  data: { properties: { user: { properties: { id: { type: integer, example: 1 }, username: { type: string, example: dad }, roles: { type: array, items: { type: string } }, permissions: { type: array, items: { type: string } } }, type: object }, access_token: { type: string }, refresh_token: { type: string } }, type: object }
                type: object
        '422':
          description: 参数缺失
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - 认证
      summary: '刷新 access_token'
      description: '使用 refresh_token 获取新的 access_token，无需重新登录。'
      operationId: 29f35ae54d0d28daad2472625f30bef7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
              type: object
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: 刷新成功 }
                  data: { properties: { access_token: { type: string }, refresh_token: { type: string } }, type: object }
                type: object
        '422':
          description: 参数缺失
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 'Token 无效或已过期'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - 认证
      summary: 注销当前设备
      description: '注销当前设备的登录状态，使该设备的 refresh_token 失效。'
      operationId: 5ce09bb9a6085d0ecbe39642f8d50fd8
      requestBody:
        content:
          application/json:
            schema:
              properties:
                refresh_token:
                  description: '可选，传入则吊销该 token'
                  type: string
              type: object
      responses:
        '200':
          description: 已注销
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
      security:
        -
          bearerAuth: []
  /auth/logout-all:
    post:
      tags:
        - 认证
      summary: 注销所有设备
      description: 注销该用户在所有设备上的登录状态。
      operationId: 3f054bf8bbc500616c467344b4c3a37a
      responses:
        '200':
          description: 已注销所有设备
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
      security:
        -
          bearerAuth: []
  /auth/me:
    get:
      tags:
        - 认证
      summary: 获取当前用户信息
      description: 获取当前已认证用户的基本信息、角色、权限和位置作用域。
      operationId: 8e3504acd920cd7a0ffba166a28d3882
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { properties: { id: { type: integer, example: 1 }, username: { type: string, example: dad }, roles: { type: array, items: { type: string } }, permissions: { type: array, items: { type: string } }, locations: { type: array, items: { type: string } } }, type: object }
                type: object
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /automations:
    get:
      tags:
        - 自动化
      summary: 自动化列表
      description: 获取自动化规则列表，支持按触发类型和启用状态筛选。
      operationId: dd348193e63b9771cbb2a75e9ffe85b9
      parameters:
        -
          name: trigger_type
          in: query
          description: 'telemetry / schedule'
          required: false
          schema:
            type: string
        -
          name: is_enabled
          in: query
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
      security:
        -
          bearerAuth: []
    post:
      tags:
        - 自动化
      summary: 创建自动化
      description: 创建新的自动化规则。支持遥测触发（telemetry）和定时触发（schedule）两种类型。
      operationId: 8d349f602a0c0865ab2205dc5d679c8a
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - trigger_type
                - trigger_config
                - actions
              properties:
                name:
                  type: string
                  example: 温度过高开空调
                trigger_type:
                  type: string
                  enum: [telemetry, schedule]
                trigger_config:
                  type: object
                  example: { device_id: 1, metric_key: temperature, condition: GREATER_THAN, value: 30 }
                actions:
                  type: array
                  items: { properties: { type: { type: string, example: device_command }, device_id: { type: integer, example: 2 }, payload: { type: object, example: { action: turn_on } } }, type: object }
                is_enabled:
                  type: boolean
                  example: true
              type: object
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/Automation' }
                type: object
        '422':
          description: 参数验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  '/automations/{id}':
    get:
      tags:
        - 自动化
      summary: 自动化详情
      operationId: 3cc26ef34ae21064545aed44283d41aa
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/Automation' }
                type: object
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    put:
      tags:
        - 自动化
      summary: 更新自动化
      operationId: e7a904cee69344b61d033ca349b6f9bd
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                trigger_config:
                  type: object
                actions:
                  type: array
                  items: { type: object }
                is_enabled:
                  type: boolean
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/Automation' }
                type: object
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
    delete:
      tags:
        - 自动化
      summary: 删除自动化
      operationId: 54ca950e19e49894192dc1d097d652af
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /commands:
    get:
      tags:
        - 指令日志
      summary: 指令日志列表
      description: 查询设备控制指令记录，支持按设备和状态筛选。自动按位置作用域过滤。
      operationId: 857282477bb5416648cd55e38fded8a1
      parameters:
        -
          name: device_id
          in: query
          required: false
          schema:
            type: integer
        -
          name: status
          in: query
          description: 'pending / delivered / success / failed / timeout'
          required: false
          schema:
            type: string
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationMeta'
      security:
        -
          bearerAuth: []
  '/commands/{id}':
    get:
      tags:
        - 指令日志
      summary: 指令详情
      operationId: eb076458c807f2400f2eb31a750b7cb0
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                properties:
                  code: { type: integer, example: 0 }
                  data: { $ref: '#/components/schemas/CommandLog' }
                type: object
        '404':
          description: 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权查看
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        -
          bearerAuth: []
  /dashboards:
    get:
      tags:
        - 仪表盘
      summary: 仪表盘列表
      description: '获取仪表盘列表。普通用户只能看到自己的，admin 可看到所有。'
      operationId: 12c73db6340c94183e1ab651f63e9588
      parameters:
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        -
          name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
