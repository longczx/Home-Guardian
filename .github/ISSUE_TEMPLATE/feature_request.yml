name: 功能建议
description: 提出新功能或改进想法
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个建议解决了什么痛点 / 场景？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他做法（可选）
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 相关设备、协议、参考实现或截图（可选）
