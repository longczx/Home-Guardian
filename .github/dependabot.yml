version: 2
updates:
  # 后端 Composer 依赖
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, backend]

  # 移动端 npm 依赖
  - package-ecosystem: npm
    directory: "/mobile"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [dependencies, ci]
