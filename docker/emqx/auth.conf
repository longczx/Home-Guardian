## Home Guardian - EMQX HTTP 认证 & 授权配置
##
## 此文件挂载至 /opt/emqx/etc/emqx.d/auth.conf
## EMQX 5.x 会自动合并 emqx.d/ 目录下的所有 .conf 文件。
##
## 认证流程：
##   设备连接 → EMQX → POST /api/mqtt/auth → Webman → 查 devices 表 → 200/401
##
## ACL 鉴权流程：
##   设备 pub/sub → EMQX → POST /api/mqtt/acl  → Webman → 校验主题权限 → 200/403

## -----------------------------------------------------------------------
## HTTP 认证（连接时验证设备凭证）
## -----------------------------------------------------------------------
## HTTP 200 = 认证通过；4xx/5xx = 拒绝连接
authentication = [
  {
    mechanism = password_based
    backend    = http
    enable     = true

    method = post
    url    = "http://webman:8787/api/mqtt/auth"

    body {
      username = "${username}"
      password = "${password}"
      clientid = "${clientid}"
    }

    headers {
      "Content-Type" = "application/x-www-form-urlencoded"
    }

    request_timeout  = "5s"
    connect_timeout  = "5s"
    pool_size        = 8
    enable_pipelining = 100
  }
]

## -----------------------------------------------------------------------
## HTTP ACL 鉴权（发布 / 订阅主题时校验权限）
## -----------------------------------------------------------------------
## 超级用户（hg_internal_client）在业务层直接放行，无需 EMQX 层额外过滤
## no_match = deny  确保未匹配任何规则时默认拒绝
authorization {
  no_match    = deny
  deny_action = disconnect

  ## 关闭缓存，确保每次操作都实时验证最新权限
  cache {
    enable = false
  }

  sources = [
    {
      type   = http
      enable = true

      method = post
      url    = "http://webman:8787/api/mqtt/acl"

      body {
        username = "${username}"
        topic    = "${topic}"
        action   = "${action}"
        clientid = "${clientid}"
      }

      headers {
        "Content-Type" = "application/x-www-form-urlencoded"
      }

      request_timeout  = "5s"
      connect_timeout  = "5s"
      pool_size        = 8
      enable_pipelining = 100
    }
  ]
}
